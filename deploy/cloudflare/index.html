<!DOCTYPE html>
<!--
 Stellarium Web Engine - deployed to Cloudflare Pages.
 Adapted from apps/simple-html/stellarium-web-engine.html with paths
 rewritten so the page is self-contained at the site root.
-->
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Stellarium Web Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
    <link rel="icon" href="data:,">

    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@3.x/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
        }

        .semi-transparent {
            opacity: 0.5;
        }

        .w-100 {
            width: 100%;
        }

        .h-100 {
            height: 100%;
        }

        .radecVal {
            display: inline-block;
            font-family: monospace;
            padding-right: 2px;
            font-size: 13px;
            font-weight: bold;
        }

        .radecUnit {
            color: #dddddd;
            font-weight: normal;
        }

        .info-card {
            max-height: calc(100vh - 180px);
            overflow-y: auto;
        }

        .info-card .v-card__text {
            padding-top: 8px;
        }

        .desc-block {
            margin-top: 12px;
            line-height: 1.55;
            font-size: 13px;
            color: #e6e6e6;
        }

        .desc-block p {
            margin: 0 0 8px 0;
            white-space: pre-wrap;
        }

        .desc-thumb {
            float: right;
            margin: 0 0 8px 12px;
            max-width: 140px;
            border-radius: 4px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .6);
        }

        .desc-source {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        .desc-source a {
            color: #80cfff;
        }

        .name-list {
            font-size: 12px;
            color: #cccccc;
            margin-top: 6px;
        }

        .name-list .name-row {
            padding: 1px 0;
        }

        .name-list .native {
            font-weight: 600;
            color: #ffffff;
            margin-right: 4px;
        }

        .name-list .pron {
            color: #b3e5fc;
        }

        .name-list .trans {
            color: #d7ccc8;
            font-style: italic;
        }

        .stel-button-label {
            font-size: 11px;
            line-height: 1.2;
            margin-top: 2px;
            color: #e0e0e0;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0, 0, 0, .8);
            user-select: none;
            white-space: nowrap;
        }

        .stel-button.semi-transparent .stel-button-label {
            color: #888;
        }
    </style>
</head>

<body>

    <div id="app">
        <v-app>
            <v-navigation-drawer absolute temporary clipped v-model="drawer" app>
                <v-list dense>
                    <v-list-item>
                        <v-list-item-action><v-icon>settings</v-icon></v-list-item-action>
                        <v-list-item-content>
                            <v-list-item-title>Settings</v-list-item-title>
                        </v-list-item-content>
                    </v-list-item>
                </v-list>
            </v-navigation-drawer>

            <v-app-bar>
                <v-app-bar-nav-icon @click.stop="drawer = !drawer"></v-app-bar-nav-icon>
                <v-toolbar-title>Stellarium<sup>Web</sup></v-toolbar-title>
                <v-spacer></v-spacer>
                <div v-if="stel && stel.core.progressbars.length">
                    {{getProgress().title}}
                    <v-progress-circular :value="getProgress().value"></v-progress-circular>
                </div>
            </v-app-bar>

            <v-footer app fixed class="transparent" style="height:auto;">
                <v-spacer></v-spacer>
                <stel-button label="Constellations" img="static/imgs/symbols/btn-cst-lines.svg"
                    :obj="stel && stel.core.constellations" attr="lines_visible"></stel-button>
                <stel-button label="Atmosphere" img="static/imgs/symbols/btn-atmosphere.svg"
                    :obj="stel && stel.core.atmosphere" attr="visible"></stel-button>
                <stel-button label="Landscape" img="static/imgs/symbols/btn-landscape.svg"
                    :obj="stel && stel.core.landscapes" attr="visible"></stel-button>
                <stel-button label="Azimuthal Grid" img="static/imgs/symbols/btn-azimuthal-grid.svg"
                    :obj="stel && stel.core.lines.azimuthal" attr="visible"></stel-button>
                <stel-button label="Equatorial Grid" img="static/imgs/symbols/btn-equatorial-grid.svg"
                    :obj="stel && stel.core.lines.equatorial" attr="visible"></stel-button>
                <stel-button label="Nebulae" img="static/imgs/symbols/btn-nebulae.svg" :obj="stel && stel.core.dsos"
                    attr="visible"></stel-button>
                <stel-button label="DSS Survey" img="static/imgs/symbols/btn-nebulae.svg" :obj="stel && stel.core.dss"
                    attr="visible"></stel-button>
                <v-spacer></v-spacer>
            </v-footer>

            <div id="stel" class="w-100 h-100" style="position: relative;">
                <canvas id="stel-canvas" style="position:absolute;" class="w-100 h-100"></canvas>
                <v-card v-if="stel && stel.core.selection" style="position:absolute; top: 64px; width:430px;"
                    class="transparent info-card">
                    <v-card-title primary-title>
                        <h3>{{getTitle(stel.core.selection)}}</h3>
                    </v-card-title>
                    <v-card-text>
                        <v-layout row wrap class="w-100">
                            <template v-for="i in getInfos(stel.core.selection)">
                                <v-flex xs4 style="color: #dddddd">{{i.key}}</v-flex>
                                <v-flex xs8 style="font-weight: 500">
                                    <span v-html="i.value"></span>
                                </v-flex>
                            </template>
                        </v-layout>
                        <div class="name-list" v-if="culturalNames.length">
                            <div class="name-row" v-for="(n, idx) in culturalNames" :key="idx">
                                <span class="native" v-if="n.native">{{n.native}}</span>
                                <span class="pron" v-if="n.pronounce">[{{n.pronounce}}]</span>
                                <span v-if="n.english">— {{n.english}}</span>
                                <span class="trans"
                                    v-if="n.translated && n.translated !== n.english">({{n.translated}})</span>
                            </div>
                        </div>
                        <div class="desc-block" v-if="selectionDescription || selectionDescLoading">
                            <img v-if="selectionImage" class="desc-thumb" :src="selectionImage" />
                            <p v-if="selectionDescLoading" style="color:#aaa">Loading description…</p>
                            <p v-else style="white-space: pre-wrap;">{{selectionDescription}}</p>
                            <div class="desc-source" v-if="selectionLink">
                                Source: <a :href="selectionLink" target="_blank" rel="noopener">Wikipedia</a>
                            </div>
                        </div>
                    </v-card-text>
                </v-card>
            </div>
            <v-snackbar v-model="geoSnackVisible" :timeout="6000" bottom>
                {{ geoSnack }}
                <v-btn text color="primary" @click="geoSnackVisible = false">OK</v-btn>
            </v-snackbar>
        </v-app>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.6.10/dist/vuetify.js"></script>
    <script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
    <script src="https://www.unpkg.com/i18next-xhr-backend/dist/umd/i18nextXHRBackend.min.js"></script>
    <script src="js/stellarium-web-engine.js"></script>

    <script type="text/x-template" id="stel-button-template">
  <div class="stel-button shrink" :class="{'semi-transparent': !value}"
       style="width:5rem; display:flex; flex-direction:column; align-items:center;"
       :title="label">
    <a v-on:click='clicked' style="width:3.6rem; height:3.6rem; display:block;">
      <img :src="img" class="w-100 h-100"/>
    </a>
    <div class="stel-button-label">{{label}}</div>
  </div>
</script>

    <script>
        Vue.component('stel-button', {
            template: '#stel-button-template',
            props: ['label', 'img', 'obj', 'attr'],
            computed: {
                value: function () { return this.obj && this.obj[this.attr]; }
            },
            methods: {
                clicked: function () {
                    if (this.obj) this.obj[this.attr] = !this.obj[this.attr];
                }
            }
        });

        i18next.use(i18nextXHRBackend).init({
            lng: 'en',
            ns: ['gui', 'skyculture'],
            debug: false,
            backend: {
                loadPath: 'https://stellarium.sfo2.cdn.digitaloceanspaces.com/' +
                    'i18n/v1/{{ns}}/{{lng}}.json'
            }
        });

        function getBaseUrl() {
            let url = document.location.href.split('/');
            url.pop();
            url = url.join('/');
            return url + '/';
        }

        new Vue({
            vuetify: new Vuetify({ theme: { dark: true } }),
            el: '#app',
            data: {
                drawer: false,
                stel: null,
                geoSnack: '',
                geoSnackVisible: false,
                culturalNames: [],
                selectionDescription: '',
                selectionDescLoading: false,
                selectionImage: '',
                selectionLink: '',
                descCache: Object.create(null),
                lastSelectionKey: null
            },
            mounted: function () {
                var that = this;
                StelWebEngine({
                    wasmFile: 'js/stellarium-web-engine.wasm',
                    canvas: document.getElementById('stel-canvas'),
                    translateFn: function (domain, str) {
                        return i18next.t(str, { ns: domain });
                    },
                    onReady: function (stel) {
                        that.stel = stel;
                        var baseUrl = getBaseUrl() + 'skydata/';
                        let core = stel.core;

                        core.stars.addDataSource({ url: baseUrl + 'stars' });
                        core.skycultures.addDataSource({ url: baseUrl + 'skycultures/western', key: 'western' });
                        core.dsos.addDataSource({ url: baseUrl + 'dso' });
                        core.landscapes.addDataSource({ url: baseUrl + 'landscapes/guereins', key: 'guereins' });
                        core.milkyway.addDataSource({ url: baseUrl + 'surveys/milkyway' });
                        core.minor_planets.addDataSource({ url: baseUrl + 'mpcorb.dat', key: 'mpc_asteroids' });
                        core.planets.addDataSource({ url: baseUrl + 'surveys/sso/moon', key: 'moon' });
                        core.planets.addDataSource({ url: baseUrl + 'surveys/sso/sun', key: 'sun' });
                        core.planets.addDataSource({ url: baseUrl + 'surveys/sso/moon', key: 'default' });
                        core.comets.addDataSource({ url: baseUrl + 'CometEls.txt', key: 'mpc_comets' });
                        core.satellites.addDataSource({ url: baseUrl + 'tle_satellite.jsonl.gz', key: 'jsonl/sat' });

                        stel.change(function (obj, attr) {
                            if (attr !== 'hovered') {
                                that.stel = Object.assign(Object.create(stel), {}, stel);
                                if (attr === 'selection') {
                                    that.onSelectionChanged();
                                }
                            }
                        });

                        stel.setFont('regular', 'static/fonts/Roboto-Regular.ttf', 1.38);
                        stel.setFont('bold', 'static/fonts/Roboto-Bold.ttf', 1.38);

                        // Use the device's geolocation to align the observer.
                        that.setupGeolocation();
                    }
                });
            },
            methods: {
                setupGeolocation: function () {
                    var that = this;
                    if (!navigator.geolocation) {
                        that.geoSnack = 'Geolocation not supported — using default location.';
                        that.geoSnackVisible = true;
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        function (pos) {
                            var lat = pos.coords.latitude;
                            var lng = pos.coords.longitude;
                            var alt = pos.coords.altitude || 0;
                            var obs = that.stel.core.observer;
                            obs.latitude = lat * Math.PI / 180;
                            obs.longitude = lng * Math.PI / 180;
                            if (alt) obs.elevation = alt;
                            that.geoSnack = 'Observer set to your location: ' +
                                lat.toFixed(3) + '°, ' + lng.toFixed(3) + '°.';
                            that.geoSnackVisible = true;
                        },
                        function (err) {
                            that.geoSnack = 'Geolocation unavailable (' +
                                (err && err.message ? err.message : 'denied') +
                                ') — using default observer location.';
                            that.geoSnackVisible = true;
                        },
                        { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
                    );
                },
                onSelectionChanged: function () {
                    var that = this;
                    var sel = this.stel && this.stel.core.selection;
                    if (!sel) {
                        this.culturalNames = [];
                        this.selectionDescription = '';
                        this.selectionDescLoading = false;
                        this.selectionImage = '';
                        this.selectionLink = '';
                        this.lastSelectionKey = null;
                        return;
                    }
                    // Cultural names from the loaded skyculture.
                    try {
                        var cn = sel.culturalDesignations() || [];
                        this.culturalNames = cn.map(function (c) {
                            return {
                                native: c.name_native || '',
                                english: c.name_english || '',
                                pronounce: c.name_pronounce || '',
                                translated: c.name_translated || ''
                            };
                        }).filter(function (c) {
                            return c.native || c.english || c.translated;
                        });
                    } catch (e) {
                        this.culturalNames = [];
                    }
                    // Wikipedia summary keyed off the primary designation.
                    var designations = sel.designations() || [];
                    if (!designations.length) return;
                    var key = designations[0];
                    if (key === this.lastSelectionKey) return;
                    this.lastSelectionKey = key;
                    var query = this._wikiQueryFromDesignations(designations);
                    this._loadDescription(query);
                },
                _wikiQueryFromDesignations: function (designations) {
                    // Prefer human-readable NAME entries; fall back to first.
                    var named = designations.filter(function (d) { return /^NAME /.test(d); })
                        .map(function (d) { return d.replace(/^NAME /, ''); });
                    if (named.length) return named[0].trim();
                    var pri = designations[0];
                    // Drop catalog prefixes that won't match Wikipedia titles.
                    pri = pri.replace(/^(HD|HIP|SAO|HR|TYC|GAIA|GJ) /i, '');
                    return pri.trim();
                },
                _loadDescription: function (title) {
                    var that = this;
                    if (!title) {
                        this.selectionDescription = '';
                        this.selectionLink = '';
                        return;
                    }
                    var cached = this.descCache[title];
                    if (cached) {
                        this.selectionDescription = cached.extract;
                        this.selectionImage = cached.thumbnail;
                        this.selectionLink = cached.link;
                        this.selectionDescLoading = false;
                        return;
                    }
                    this.selectionDescription = '';
                    this.selectionImage = '';
                    this.selectionLink = '';
                    this.selectionDescLoading = true;
                    // Use a same-origin Cloudflare Pages Function as Wikipedia proxy
                    // (avoids CORS issues and works in regions where wikipedia.org is blocked).
                    var url = '/api/wiki?title=' + encodeURIComponent(title) + '&lang=en';
                    fetch(url)
                        .then(function (r) { return r.ok ? r.json() : null; })
                        .then(function (j) {
                            if (that.lastSelectionKey === null) return;
                            var entry = {
                                extract: (j && j.extract) ? j.extract : '',
                                thumbnail: (j && j.thumbnail && j.thumbnail.source) ? j.thumbnail.source : '',
                                link: (j && j.content_urls && j.content_urls.desktop && j.content_urls.desktop.page) ? j.content_urls.desktop.page : ''
                            };
                            that.descCache[title] = entry;
                            that.selectionDescription = entry.extract;
                            that.selectionImage = entry.thumbnail;
                            that.selectionLink = entry.link;
                            that.selectionDescLoading = false;
                        })
                        .catch(function () {
                            that.selectionDescription = '';
                            that.selectionDescLoading = false;
                        });
                },
                getTitle: function (obj) {
                    var name = obj.designations()[0];
                    return name.replace(/^NAME /, '');
                },
                getProgress: function () {
                    var bar = this.stel.core.progressbars[0];
                    return { title: bar.label, value: bar.value / bar.total * 100 };
                },
                getInfos: function (obj) {
                    var stel = this.stel;
                    var formatInt = function (num, padLen) {
                        let pad = new Array(1 + padLen).join('0');
                        return (pad + num).slice(-pad.length);
                    };
                    var formatRA = function (a) {
                        var raf = stel.a2tf(a, 1);
                        return '<div class="radecVal">' + formatInt(raf.hours, 2) +
                            '<span class="radecUnit">h</span>&nbsp;</div>' +
                            '<div class="radecVal">' + formatInt(raf.minutes, 2) +
                            '<span class="radecUnit">m</span></div>' +
                            '<div class="radecVal">' + formatInt(raf.seconds, 2) +
                            '.' + raf.fraction + '<span class="radecUnit">s</span></div>';
                    };
                    var formatDec = function (a) {
                        var raf = stel.a2af(a, 1);
                        return '<div class="radecVal">' + raf.sign + formatInt(raf.degrees, 2) +
                            '<span class="radecUnit">°</span></div><div class="radecVal">' +
                            formatInt(raf.arcminutes, 2) +
                            '<span class="radecUnit">\'</span></div><div class="radecVal">' +
                            formatInt(raf.arcseconds, 2) + '.' + raf.fraction +
                            '<span class="radecUnit">"</span></div>';
                    };
                    var formatAz = function (a) {
                        let raf = stel.a2af(a, 1);
                        return '<div class="radecVal">' +
                            formatInt(raf.degrees < 0 ? raf.degrees + 180 : raf.degrees, 3) +
                            '<span class="radecUnit">°</span></div><div class="radecVal">' +
                            formatInt(raf.arcminutes, 2) +
                            '<span class="radecUnit">\'</span></div><div class="radecVal">' +
                            formatInt(raf.arcseconds, 2) + '.' + raf.fraction +
                            '<span class="radecUnit">"</span></div>';
                    };
                    var ret = [];
                    var obs = stel.core.observer;
                    var cirs = stel.convertFrame(obs, 'ICRF', 'CIRS', obj.getInfo('radec'));
                    var radec = stel.c2s(cirs);
                    var ra = stel.anp(radec[0]);
                    var dec = stel.anpm(radec[1]);
                    var observed = stel.convertFrame(obs, 'CIRS', 'OBSERVED', cirs);
                    var azalt = stel.c2s(observed);
                    var az = stel.anp(azalt[0]);
                    var alt = stel.anp(azalt[1]);
                    var vmag = obj.getInfo('vmag');
                    var distance = obj.getInfo('distance');
                    ret.push({ key: 'Magnitude', value: vmag === undefined ? 'Unknown' : vmag.toFixed(2) });
                    if (distance !== undefined && distance > 0) {
                        // distance is in AU; > 1e5 AU means it's a star/DSO -> show in light-years.
                        var val;
                        if (distance > 1e5) {
                            var ly = distance / 63241.077;
                            val = ly >= 1000 ? (ly / 1000).toFixed(2) + ' kly' : ly.toFixed(2) + ' ly';
                        } else {
                            val = distance.toFixed(distance < 1 ? 4 : 3) + ' AU';
                        }
                        ret.push({ key: 'Distance', value: val });
                    }
                    ret.push({ key: 'Ra/Dec', value: formatRA(ra) + '&nbsp;&nbsp;&nbsp;' + formatDec(dec) });
                    ret.push({ key: 'Az/Alt', value: formatAz(az) + '&nbsp;&nbsp;&nbsp;' + formatDec(alt) });
                    return ret;
                }
            }
        });
    </script>
</body>

</html>
